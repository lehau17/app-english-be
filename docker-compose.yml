services:
  postgres:
    image: pgvector/pgvector:0.8.0-pg17-trixie
    container_name: english_learning_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: english_learning
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.3.6
    container_name: redpanda
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr redpanda:33145
      - --advertise-rpc-addr redpanda:33145
      - --mode dev-container
      - --smp 1
      - --default-log-level=info
    ports:
      - 19092:19092 # Kafka external
      - 18081:18081 # Schema Registry,
      - 18082:18082 # Pandaproxy (HTTP API),
      - 19644:9644 # Admin API,
    healthcheck:
      test: ['CMD', 'rpk', 'cluster', 'info']
      interval: 10s
      timeout: 5s
      retries: 10

  redpanda_console:
    image: docker.redpanda.com/redpandadata/console:v2.8.3
    container_name: redpanda_console
    entrypoint: /bin/sh
    command: -c 'echo "$$CONSOLE_CONFIG_FILE" > /tmp/config.yml; /app/console'
    environment:
      CONFIG_FILEPATH: /tmp/config.yml
      CONSOLE_CONFIG_FILE: |
        kafka:
          brokers: ["redpanda:9092"]
          schemaRegistry:
            enabled: true
            urls: ["http://redpanda:8081/"]
        redpanda:
          adminApi:
            enabled: true
            urls: ["http://redpanda:9644/"]
    ports:
      - 8000:8080
    depends_on:
      - redpanda

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:latest
    container_name: minio
    command: server --console-address ":9001" /data
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # Web Console
    volumes:
      - minio_data:/data



  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      - minio
    # Khai báo alias 'local' qua biến môi trường (gọn hơn)
    environment:
      MC_HOST_local: http://minio:minio123@minio:9000
    entrypoint: >
      /bin/sh -c '
      echo ">> Waiting for MinIO...";
      until mc ls local >/dev/null 2>&1; do sleep 2; done;
      echo ">> Creating bucket (idempotent)...";
      mc mb -p local/english-learning-bucket || true;
      echo ">> Set anonymous READ (public-download) on bucket...";
      mc anonymous set download local/english-learning-bucket || true;
      # fallback cho mc phiên bản cũ:
      mc policy set public local/english-learning-bucket || true;
      echo ">> Done.";
      '
    restart: "no"

  # Piper TTS HTTP API Server
  piper-tts:
    image: rhasspy/wyoming-piper:latest
    container_name: piper-tts
    command: --voice en_US-lessac-medium
    ports:
      - "10200:10200"
    volumes:
      - piper_data:/data
    restart: unless-stopped

  # Vosk ASR WebSocket Server
  vosk-asr:
    image: alphacep/kaldi-en:latest
    container_name: vosk-asr
    ports:
      - "2700:2700"
    environment:
      - MODEL_VERSION=vosk-model-small-en-us-0.15
    restart: unless-stopped

volumes:
  pg_data:
  redis_data:
  minio_data:
  piper_data:
