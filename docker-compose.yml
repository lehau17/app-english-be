  minio:
    image: minio/minio:latest
    container_name: minio
    command: server --console-address ":9001" /data
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio3881016Hau@
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # Web Console
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      - minio
    # Khai báo alias 'local' qua biến môi trường (gọn hơn)
    environment:
      MC_HOST_local: http://minio:minio3881016Hau@@minio:9000
    entrypoint: >
      /bin/sh -c '
      echo ">> Waiting for MinIO...";
      until mc ls local >/dev/null 2>&1; do sleep 2; done;
      echo ">> Creating bucket (idempotent)...";
      mc mb -p local/english-learning-bucket || true;
      echo ">> Set anonymous READ (public-download) on bucket...";
      mc anonymous set download local/english-learning-bucket || true;
      # fallback cho mc phiên bản cũ:
      mc policy set public local/english-learning-bucket || true;
      echo ">> Done.";
      '
    restart: "no"

  # Piper TTS HTTP API Server
  # piper-tts:
