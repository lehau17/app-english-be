services:
  postgres:
    image: pgvector/pgvector:0.8.0-pg17-trixie
    container_name: english_learning_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 3881016Hau@
      POSTGRES_DB: english_learning
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: english_learning_redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

