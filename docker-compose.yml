version: '3.8'
services:
  postgres:
    image: postgres:13
    container_name: english_learning_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: english_learning
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.3.6
    container_name: redpanda
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr redpanda:33145
      - --advertise-rpc-addr redpanda:33145
      - --mode dev-container
      - --smp 1
      - --default-log-level=info
    ports:
      - 19092:19092 # Kafka external
      - 18081:18081 # Schema Registry,
      - 18082:18082 # Pandaproxy (HTTP API),
      - 19644:9644 # Admin API,
    # volumes: redpanda:/var/lib/redpanda/data,
    healthcheck:
      test: ['CMD', 'rpk', 'cluster', 'info']
      interval: 10s
      timeout: 5s
      retries: 10

  redpanda_console:
    image: docker.redpanda.com/redpandadata/console:v2.8.3
    container_name: redpanda_console
    entrypoint: /bin/sh
    command: -c 'echo "$$CONSOLE_CONFIG_FILE" > /tmp/config.yml; /app/console'
    environment:
      CONFIG_FILEPATH: /tmp/config.yml
      CONSOLE_CONFIG_FILE: |
        kafka:
          brokers: ["redpanda:9092"]
          schemaRegistry:
            enabled: true
            urls: ["http://redpanda:8081/"]
        redpanda:
          adminApi:
            enabled: true
            urls: ["http://redpanda:9644/"]
    ports:
      - 8000:8080
    depends_on:
      - redpanda

volumes:
  pg_data:
