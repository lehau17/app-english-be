name: Build and Deploy to VPS

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - staging

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest

    strategy:
      matrix:
        app: [client-api, background-worker, notification]

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔐 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 🏗️ Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🐳 Build and push ${{ matrix.app }}
        uses: docker/build-push-action@v5
        timeout-minutes: 30
        with:
          context: .
          file: ${{ matrix.app == 'client-api' && './Dockerfile' || format('./Dockerfile.{0}', matrix.app) }}
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/english-learning-${{ matrix.app }}:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/english-learning-${{ matrix.app }}:latest
          build-args: |
            APP_NAME=${{ matrix.app }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/english-learning-${{ matrix.app }}:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/english-learning-${{ matrix.app }}:buildcache,mode=max
          platforms: linux/amd64
          provenance: false
          sbom: false

      - name: ✅ Image built successfully
        run: |
          echo "✅ ${{ matrix.app }} image built and pushed successfully"
          echo "🏷️ Tag: ${{ github.sha }}"

  deploy:
    name: Deploy to VPS
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔐 Setup SSH Key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p ${{ secrets.VPS_PORT || '22' }} -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: 📦 Prepare deployment files
        run: |
          mkdir -p deploy
          cp docker-compose.prod.yml deploy/
          cp deploy.sh deploy/
          cp .env.example deploy/.env.example

      - name: 🚀 Deploy to VPS via SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT || '22' }}
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # Create deployment directory on VPS
          ssh -o StrictHostKeyChecking=no -p $VPS_PORT $VPS_USER@$VPS_HOST << 'ENDSSH'
            mkdir -p ~/english-learning-backend
            cd ~/english-learning-backend
          ENDSSH

          # Copy deployment files to VPS
          scp -o StrictHostKeyChecking=no -P $VPS_PORT -r deploy/* $VPS_USER@$VPS_HOST:~/english-learning-backend/

          # Execute deployment on VPS
          ssh -o StrictHostKeyChecking=no -p $VPS_PORT $VPS_USER@$VPS_HOST << ENDSSH
            cd ~/english-learning-backend

            # Check .env file exists
            if [ ! -f .env ]; then
              echo "❌ ERROR: .env file not found on VPS"
              echo "📝 Please create .env file at ~/english-learning-backend/.env"
              echo "💡 Use .env.example as template"
              exit 1
            fi

            # Export Docker deployment variables
            export DOCKER_USERNAME=$DOCKER_USERNAME
            export IMAGE_TAG=$IMAGE_TAG

            # Make deploy script executable
            chmod +x deploy.sh

            # Run deployment (deploy.sh will load .env automatically via docker-compose)
            ./deploy.sh
          ENDSSH

      - name: ✅ Deployment completed
        run: |
          echo "✅ Deployment to VPS completed successfully!"
          echo "🔗 VPS: ${{ secrets.VPS_HOST }}"
          echo "🏷️ Image tag: ${{ github.sha }}"

      - name: 🔍 Health check
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT || '22' }}
        run: |
          sleep 15
          ssh -o StrictHostKeyChecking=no -p $VPS_PORT $VPS_USER@$VPS_HOST << 'ENDSSH'
            cd ~/english-learning-backend
            echo "🔍 Checking service status..."
            docker compose -f docker-compose.prod.yml ps
          ENDSSH

  notify:
    name: Send Notification
    needs: [build, deploy]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: 📢 Deployment Status
        run: |
          if [ "${{ needs.deploy.result }}" == "success" ]; then
            echo "✅ Deployment successful!"
          else
            echo "❌ Deployment failed!"
            exit 1
          fi
